<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" shape-rendering="crispEdges">
  <defs>
    <style>
      .o{fill:#1e2430}
      .bg{fill:#eef8fb}
      .bg2{fill:#d1eef7}
      .teal1{fill:#39c7c1}
      .teal2{fill:#1ea39d}
      .teal3{fill:#0e6f79}
      .mint{fill:#93f1ea}
      .gold1{fill:#ffd56f}
      .gold2{fill:#ffb24a}
      .pink{fill:#ff8fb8}
      .gray1{fill:#cad4de}
      .gray2{fill:#92a0b0}
      .white{fill:#fffefb}
    </style>
  </defs>

  <rect width="256" height="256" class="bg"/>
  <rect x="16" y="16" width="224" height="224" rx="20" class="bg2"/>

  <!-- antenna -->
  <rect x="94" y="26" width="14" height="20" class="o"/>
  <rect x="98" y="18" width="6" height="12" class="o"/>
  <rect x="116" y="32" width="10" height="14" class="o"/>

  <!-- body outline -->
  <rect x="56" y="46" width="88" height="10" class="o"/>
  <rect x="46" y="56" width="108" height="10" class="o"/>
  <rect x="38" y="66" width="124" height="96" class="o"/>
  <rect x="46" y="162" width="108" height="18" class="o"/>
  <rect x="56" y="180" width="88" height="10" class="o"/>

  <!-- body -->
  <rect x="46" y="66" width="108" height="96" class="teal1"/>
  <rect x="54" y="74" width="92" height="80" class="teal2"/>
  <rect x="64" y="56" width="18" height="10" class="teal3"/>
  <rect x="118" y="56" width="18" height="10" class="teal3"/>

  <!-- face screen -->
  <rect x="72" y="86" width="56" height="34" class="gray1"/>
  <rect x="80" y="94" width="10" height="10" class="o"/>
  <rect x="110" y="94" width="10" height="10" class="o"/>
  <rect x="92" y="108" width="16" height="4" class="o"/>

  <!-- speaker and buttons -->
  <rect x="68" y="126" width="64" height="8" class="teal3"/>
  <rect x="68" y="138" width="12" height="8" class="gold1"/>
  <rect x="84" y="138" width="12" height="8" class="gold2"/>
  <rect x="100" y="138" width="12" height="8" class="pink"/>
  <rect x="116" y="138" width="12" height="8" class="mint"/>

  <!-- blush / cheeks -->
  <rect x="64" y="102" width="8" height="6" class="pink"/>
  <rect x="128" y="102" width="8" height="6" class="pink"/>

  <!-- left arm -->
  <rect x="22" y="94" width="8" height="30" class="o"/>
  <rect x="30" y="102" width="8" height="22" class="o"/>
  <rect x="30" y="94" width="8" height="8" class="teal2"/>
  <rect x="38" y="102" width="8" height="12" class="teal2"/>
  <rect x="38" y="114" width="10" height="10" class="gold1"/>

  <!-- right arm raised -->
  <rect x="154" y="88" width="8" height="18" class="o"/>
  <rect x="162" y="78" width="8" height="18" class="o"/>
  <rect x="170" y="70" width="8" height="18" class="o"/>
  <rect x="154" y="106" width="8" height="16" class="teal2"/>
  <rect x="162" y="96" width="8" height="16" class="teal2"/>
  <rect x="170" y="88" width="8" height="16" class="gold1"/>
  <rect x="178" y="80" width="8" height="16" class="gold1"/>

  <!-- headphones / ear speaker -->
  <rect x="178" y="68" width="12" height="12" class="o"/>
  <rect x="182" y="72" width="4" height="4" class="white"/>

  <!-- feet -->
  <rect x="68" y="190" width="14" height="24" class="o"/>
  <rect x="118" y="190" width="14" height="24" class="o"/>
  <rect x="64" y="214" width="24" height="8" class="pink"/>
  <rect x="114" y="214" width="24" height="8" class="pink"/>

  <!-- tiny spark -->
  <rect x="188" y="54" width="8" height="8" class="white"/>
  <rect x="196" y="62" width="8" height="8" class="white"/>
  <rect x="188" y="70" width="8" height="8" class="white"/>

  <!-- ground -->
  <rect x="58" y="224" width="84" height="6" fill="#97aebb" opacity=".45"/>
</svg>
